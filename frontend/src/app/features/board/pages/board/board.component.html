<div class="board-page">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn-icon" (click)="goBack()" title="Back to dashboard">←</button>
      <span class="board-title">{{ board?.name || 'Loading...' }}</span>
    </div>

    <div class="toolbar-center">
      <!-- Tools -->
      <button
        *ngFor="let tool of tools"
        class="tool-btn"
        [class.active]="currentTool === tool.id"
        (click)="setTool(tool.id)"
        [title]="tool.label"
      >{{ tool.icon }}</button>

      <div class="divider"></div>

      <!-- Fill toggle (for shapes) -->
      <button
        class="tool-btn"
        [class.active]="isFilled"
        (click)="toggleFill()"
        title="Toggle fill"
      >{{ isFilled ? '◼️' : '◻️' }}</button>

      <div class="divider"></div>

      <!-- Colors -->
      <div
        *ngFor="let color of colors"
        class="color-dot"
        [style.background]="color"
        [class.active]="currentColor === color && currentTool !== 'eraser'"
        (click)="setColor(color)"
      ></div>

      <div class="divider"></div>

      <!-- Stroke widths -->
      <div
        *ngFor="let w of widths"
        class="width-btn"
        [class.active]="currentWidth === w"
        (click)="setWidth(w)"
      >
        <div class="width-preview" [style.width.px]="w" [style.height.px]="w"></div>
      </div>

      <div class="divider"></div>

      <!-- Undo / Redo -->
      <button class="tool-btn" (click)="undo()" title="Undo (Ctrl+Z)">↩️</button>
      <button class="tool-btn" (click)="redo()" title="Redo (Ctrl+Y)">↪️</button>

      <div class="divider"></div>

      <button class="tool-btn" (click)="clearBoard()" title="Clear board">🗑️</button>
    </div>

    <div class="toolbar-right">
      <div class="online-users">
        <div
          *ngFor="let user of onlineUsers"
          class="online-avatar"
          [title]="user.userName"
        >
          {{ getInitials(user.userName) }}
        </div>
      </div>
    </div>
  </div>

  <!-- Canvas layers -->
  <div class="canvas-container">
    <canvas #mainCanvas class="whiteboard-canvas"></canvas>
    <canvas
      #previewCanvas
      class="preview-canvas"
      (mousedown)="onMouseDown($event)"
      (mousemove)="onMouseMove($event)"
      (mouseup)="onMouseUp($event)"
      (mouseleave)="onMouseLeave()"
      (touchstart)="onTouchStart($event)"
      (touchmove)="onTouchMove($event)"
      (touchend)="onTouchEnd($event)"
    ></canvas>
  </div>

  <!-- Text input overlay -->
  <input
    *ngIf="showTextInput"
    #textInput
    class="canvas-text-input"
    [style.left.px]="textInputX"
    [style.top.px]="textInputY + 60"
    [(ngModel)]="textInputValue"
    (keydown)="onTextKeydown($event)"
    (blur)="submitText()"
    [style.color]="currentColor"
    [style.fontSize.px]="currentFontSize"
    placeholder="Type here..."
  />

  <!-- Remote cursors -->
  <div
    *ngFor="let cursor of getCursorArray()"
    class="remote-cursor"
    [style.left.px]="cursor.x"
    [style.top.px]="cursor.y + 60"
  >
    <div class="cursor-dot"></div>
    <span class="cursor-name">{{ cursor.userName }}</span>
  </div>
</div>
