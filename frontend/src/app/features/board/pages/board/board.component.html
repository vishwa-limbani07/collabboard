<div class="board-page">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn-icon" (click)="goBack()" title="Back to dashboard">←</button>
      <span class="board-title">{{ board?.name || 'Loading...' }}</span>
    </div>

    <div class="toolbar-center">
      <!-- Tool selection -->
      <button
        class="tool-btn"
        [class.active]="currentTool === 'pen'"
        (click)="setTool('pen')"
        title="Pen"
      >✏️</button>
      <button
        class="tool-btn"
        [class.active]="currentTool === 'eraser'"
        (click)="setTool('eraser')"
        title="Eraser"
      >🧹</button>

      <div class="divider"></div>

      <!-- Colors -->
      <div
        *ngFor="let color of colors"
        class="color-dot"
        [style.background]="color"
        [class.active]="currentColor === color && currentTool === 'pen'"
        (click)="setColor(color)"
      ></div>

      <div class="divider"></div>

      <!-- Stroke widths -->
      <div
        *ngFor="let w of widths"
        class="width-btn"
        [class.active]="currentWidth === w"
        (click)="setWidth(w)"
      >
        <div class="width-preview" [style.width.px]="w" [style.height.px]="w"></div>
      </div>

      <div class="divider"></div>

      <button class="tool-btn" (click)="clearBoard()" title="Clear board">🗑️</button>
    </div>

    <div class="toolbar-right">
      <!-- Online users -->
      <div class="online-users">
        <div
          *ngFor="let user of onlineUsers"
          class="online-avatar"
          [title]="user.userName"
        >
          {{ getInitials(user.userName) }}
        </div>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <canvas
    #canvas
    class="whiteboard-canvas"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseLeave()"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd()"
  ></canvas>

  <!-- Remote cursors -->
  <div
    *ngFor="let cursor of getCursorArray()"
    class="remote-cursor"
    [style.left.px]="cursor.x"
    [style.top.px]="cursor.y + 60"
  >
    <div class="cursor-dot"></div>
    <span class="cursor-name">{{ cursor.userName }}</span>
  </div>
</div>
