<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>CollabBoard</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

    <div class="form-group" [class.has-error]="emailError">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        (keyup.enter)="onSubmit()"
        (blur)="validateEmail()"
      />
      <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
    </div>

    <div class="form-group" [class.has-error]="passwordError">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        placeholder="Enter your password"
        (keyup.enter)="onSubmit()"
        (blur)="validatePassword()"
      />
      <span class="field-error" *ngIf="passwordError">{{ passwordError }}</span>
    </div>

    <button
      class="btn-primary"
      (click)="onSubmit()"
      [disabled]="loading"
    >
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
